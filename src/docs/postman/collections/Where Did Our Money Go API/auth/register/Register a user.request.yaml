$kind: http-request
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "Milena",
      "email": "milena@example.com",
      "password": "strong-password",
      "familyId": "family-main"
    }
examples: ./.resources/Register a user.resources/examples
order: 1000
