$kind: http-example
request:
  url: "{{baseUrl}}/auth/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "Milena",
        "email": "milena@example.com",
        "password": "strong-password",
        "familyId": "family-main"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
