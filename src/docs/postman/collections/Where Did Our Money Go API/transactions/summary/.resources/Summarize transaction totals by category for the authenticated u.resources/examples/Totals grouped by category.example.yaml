$kind: http-example
request:
  url: "{{baseUrl}}/transactions/summary"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "alimentação": 500,
        "transporte": 200,
        "lazer": 150,
        "outros": 100
      }
order: 1000
