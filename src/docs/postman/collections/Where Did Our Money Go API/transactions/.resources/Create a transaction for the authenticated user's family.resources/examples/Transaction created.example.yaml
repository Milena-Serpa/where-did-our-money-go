$kind: http-example
request:
  url: "{{baseUrl}}/transactions"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "title": "Supermercado",
        "amount": 42.9,
        "category": "alimentação",
        "date": "2026-05-02T12:00:00.000Z"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "66a000000000000000000002",
        "title": "Supermercado",
        "amount": 42.9,
        "category": "alimentação",
        "date": "2026-05-02T12:00:00.000Z",
        "userId": "66a000000000000000000001",
        "familyId": "family-main"
      }
order: 1000
